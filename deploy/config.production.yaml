server:
  port: 8080

cors:
  allowed_origins:
    - "https://bytebrew.ai"

auth:
  access_token_ttl: 15m
  refresh_token_ttl: 168h
  password_reset_ttl: 1h

trial:
  steps_per_hour: 20

stripe:
  success_url: "https://bytebrew.ai/billing/success"
  cancel_url: "https://bytebrew.ai/billing/cancel"
  trial_days: 14

deepinfra:
  base_url: "https://api.deepinfra.com/v1/openai"

email:
  from_email: "ByteBrew <noreply@bytebrew.ai>"
  frontend_url: "https://bytebrew.ai"

model_routing:
  default_model: "zai-org/GLM-5"
  role_overrides:
    reviewer: "zai-org/GLM-4.7"
    tester: "zai-org/GLM-4.7"
