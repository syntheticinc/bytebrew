# ByteBrew Engine — Docker Compose
# Download: curl -fsSL https://get.bytebrew.ai/docker-compose.yml -o docker-compose.yml
# Start:    docker compose up -d
# Admin:    http://localhost:8443/admin

services:
  engine:
    image: bytebrew/engine:latest
    ports:
      - "${ENGINE_PORT:-8443}:8443"
    environment:
      - DATABASE_URL=postgresql://bytebrew:${POSTGRES_PASSWORD:-bytebrew}@db:5432/bytebrew
      - LLM_API_KEY=${LLM_API_KEY:-}
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme}
    volumes:
      - engine-data:/var/lib/bytebrew
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: bytebrew
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bytebrew}
      POSTGRES_DB: bytebrew
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bytebrew"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  engine-data:
  pg-data:
