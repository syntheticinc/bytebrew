# Local development reverse proxy (Caddy)
#
# Proxies all traffic through a single port (3000):
#   /           → cloud-web Vite dev server (localhost:3011)
#   /docs/*     → docs-site Starlight dev server (localhost:4321)
#
# Usage:
#   1. Start your dev servers:
#      - cloud-web:  cd cloud-web && npm run dev    (port 3011)
#      - docs-site:  cd docs-site && npm run dev    (port 4321)
#   2. Start Caddy proxy:
#      docker compose -f docker-compose.dev.yml up -d
#   3. Open http://localhost:3000
#
# Stop:
#   docker compose -f docker-compose.dev.yml down

services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "3000:3000"
    volumes:
      - ./Caddyfile.dev:/etc/caddy/Caddyfile:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
