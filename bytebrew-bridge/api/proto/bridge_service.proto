syntax = "proto3";

package bytebrew.bridge.v1;

option go_package = "github.com/syntheticinc/bytebrew/bytebrew-bridge/api/proto/gen;bridgev1";

// BridgeService relays encrypted frames between mobile devices and bytebrew servers.
// The bridge sees only opaque encrypted blobs — it never decrypts content.
service BridgeService {
  // RegisterServer: a bytebrew-srv instance registers itself to receive mobile connections.
  // Server sends identification frame first, then relays frames bidirectionally.
  rpc RegisterServer(stream BridgeFrame) returns (stream BridgeFrame);

  // Connect: a mobile device connects to a registered server through the bridge.
  // Mobile sends target server_id frame first, then relays frames bidirectionally.
  rpc Connect(stream BridgeFrame) returns (stream BridgeFrame);

  // ListOnlineServers: mobile queries which servers are currently connected.
  rpc ListOnlineServers(ListOnlineRequest) returns (ListOnlineResponse);
}

message BridgeFrame {
  string server_id = 1;     // Target/source server ID
  string device_id = 2;     // Mobile device ID (for routing)
  bytes payload = 3;        // E2E encrypted data, bridge cannot read
  FrameType type = 4;       // Frame type for routing
  string auth_token = 5;    // Authentication token for bridge access
}

enum FrameType {
  FRAME_TYPE_UNSPECIFIED = 0;
  FRAME_TYPE_REGISTER = 1;    // Server registration handshake
  FRAME_TYPE_CONNECT = 2;     // Mobile connection request
  FRAME_TYPE_DATA = 3;        // Regular data frame
  FRAME_TYPE_DISCONNECT = 4;  // Graceful disconnect
}

message ListOnlineRequest {
  string device_id = 1;  // Mobile device ID (for access control)
}

message ListOnlineResponse {
  repeated OnlineServer servers = 1;
}

message OnlineServer {
  string server_id = 1;
  string server_name = 2;
  int64 connected_since = 3;  // Unix timestamp
}
