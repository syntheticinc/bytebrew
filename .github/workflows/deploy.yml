name: Deploy Cloud

on:
  push:
    branches: [main]
    paths:
      - 'bytebrew-cloud-api/**'
      - 'bytebrew-cloud-web/**'
      - '.github/workflows/deploy.yml'

# Cancel in-progress deployments when a new push arrives
concurrency:
  group: deploy-cloud
  cancel-in-progress: true

# Required secrets (configure in GitHub repo settings):
#   VPS_HOST     - IP address of the Hetzner VPS
#   VPS_SSH_KEY  - Private SSH key for the 'deploy' user on VPS

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- Build API ---
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build API binary
        run: |
          cd bytebrew-cloud-api
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o ../build/bytebrew-cloud-api ./cmd/server

      # --- Build Frontend ---
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build frontend
        run: |
          cd bytebrew-cloud-web
          npm ci
          npm run build

      # --- Upload artifacts ---
      - name: Upload API binary
        uses: actions/upload-artifact@v4
        with:
          name: api-binary
          path: build/bytebrew-cloud-api
          retention-days: 1

      - name: Upload frontend bundle
        uses: actions/upload-artifact@v4
        with:
          name: frontend-bundle
          path: bytebrew-cloud-web/dist/
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ secrets.VPS_HOST != '' }}
    steps:
      - name: Download API binary
        uses: actions/download-artifact@v4
        with:
          name: api-binary
          path: build/

      - name: Download frontend bundle
        uses: actions/download-artifact@v4
        with:
          name: frontend-bundle
          path: bytebrew-cloud-web/dist/

      - name: Backup and stop service
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            sudo cp /usr/local/bin/bytebrew-cloud-api /usr/local/bin/bytebrew-cloud-api.bak 2>/dev/null || true
            sudo systemctl stop bytebrew-cloud-api || true

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "build/bytebrew-cloud-api,bytebrew-cloud-web/dist/*"
          target: "/tmp/bytebrew-deploy"

      - name: Install and verify
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            sudo mv /tmp/bytebrew-deploy/build/bytebrew-cloud-api /usr/local/bin/bytebrew-cloud-api
            sudo chmod +x /usr/local/bin/bytebrew-cloud-api
            sudo rm -rf /var/www/bytebrew-cloud-web
            sudo mv /tmp/bytebrew-deploy/bytebrew-cloud-web/dist /var/www/bytebrew-cloud-web
            sudo systemctl start bytebrew-cloud-api
            rm -rf /tmp/bytebrew-deploy

            # Health check with rollback
            sleep 3
            if ! curl -sf http://127.0.0.1:8080/health; then
              echo "Health check failed! Rolling back..."
              sudo systemctl stop bytebrew-cloud-api
              sudo mv /usr/local/bin/bytebrew-cloud-api.bak /usr/local/bin/bytebrew-cloud-api
              sudo systemctl start bytebrew-cloud-api
              sleep 3
              sudo journalctl -u bytebrew-cloud-api --no-pager -n 50
              exit 1
            fi

            # Cleanup backup on success
            sudo rm -f /usr/local/bin/bytebrew-cloud-api.bak
