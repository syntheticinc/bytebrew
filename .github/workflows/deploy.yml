name: Deploy Cloud

on:
  push:
    branches: [main]
    paths:
      - 'cloud-api/**'
      - 'cloud-web/**'
      - 'docs-site/**'
      - 'engine/**'
      - 'mcp-docs-server/**'
      - 'deploy/**'
      - '.github/workflows/deploy.yml'

# Cancel in-progress deployments when a new push arrives
concurrency:
  group: deploy-cloud
  cancel-in-progress: true

# Required secrets (configure in GitHub repo settings):
#   VPS_HOST     - IP address of the Hetzner VPS
#   VPS_SSH_KEY  - Private SSH key for the 'deploy' user on VPS

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- Build API ---
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build API binary
        run: |
          cd cloud-api
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o ../build/bytebrew-cloud-api ./cmd/server

      # --- Build MCP Docs Server ---
      - name: Build MCP docs server binary
        run: |
          cd mcp-docs-server
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o ../build/bytebrew-mcp-docs .

      # --- Build Frontend ---
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build frontend
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          VITE_SHOW_EE_PRICING: 'true'
          VITE_SHOW_CODE_SITE: ''
        run: |
          cd cloud-web
          npm ci
          npm run build

      # --- Build Docs ---
      - name: Build docs site
        run: |
          cd docs-site
          npm ci
          npm run build

      # --- Build Docker Images ---
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Read version
        id: version
        run: echo "VERSION=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Build and push Engine Docker image
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          cd engine
          docker build \
            --build-arg VERSION=$VERSION \
            -t bytebrew/engine:latest \
            -t bytebrew/engine:$VERSION .
          docker push bytebrew/engine:latest
          docker push bytebrew/engine:$VERSION
          docker save bytebrew/engine:latest | gzip > ../build/engine.tar.gz

      - name: Build MCP Docs Docker image
        run: |
          cd mcp-docs-server
          docker build -t bytebrew/mcp-docs:latest .
          docker save bytebrew/mcp-docs:latest | gzip > ../build/mcp-docs.tar.gz

      # --- Deploy ---
      - name: Backup and stop services
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            sudo cp /usr/local/bin/bytebrew-cloud-api /usr/local/bin/bytebrew-cloud-api.bak 2>/dev/null || true
            sudo systemctl stop bytebrew-cloud-api || true

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "build/,cloud-web/dist,docs-site/dist,docs-site/src/content/docs,deploy/config.production.yaml,deploy/Caddyfile"
          target: "/tmp/bytebrew-deploy"

      - name: Configure secrets
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            sudo cp /tmp/bytebrew-deploy/deploy/config.production.yaml /etc/bytebrew/config.yaml
            sudo chown bytebrew:bytebrew /etc/bytebrew/config.yaml
            sudo chmod 640 /etc/bytebrew/config.yaml

            sudo tee /etc/bytebrew/cloud-api.env > /dev/null << 'ENVEOF'
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            AUTH_JWT_SECRET=${{ secrets.AUTH_JWT_SECRET }}
            LICENSE_PRIVATE_KEY_HEX=${{ secrets.LICENSE_PRIVATE_KEY_HEX }}
            STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
            STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}
            STRIPE_PRICES_PERSONAL_MONTHLY=${{ secrets.STRIPE_PRICES_PERSONAL_MONTHLY }}
            STRIPE_PRICES_PERSONAL_ANNUAL=${{ secrets.STRIPE_PRICES_PERSONAL_ANNUAL }}
            STRIPE_PRICES_TEAMS_MONTHLY=${{ secrets.STRIPE_PRICES_TEAMS_MONTHLY }}
            STRIPE_PRICES_TEAMS_ANNUAL=${{ secrets.STRIPE_PRICES_TEAMS_ANNUAL }}
            STRIPE_PRICES_ENGINE_EE_MONTHLY=${{ secrets.STRIPE_PRICES_ENGINE_EE_MONTHLY }}
            STRIPE_PRICES_ENGINE_EE_ANNUAL=${{ secrets.STRIPE_PRICES_ENGINE_EE_ANNUAL }}
            DEEPINFRA_API_KEY=${{ secrets.DEEPINFRA_API_KEY }}
            EMAIL_RESEND_API_KEY=${{ secrets.EMAIL_RESEND_API_KEY }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            ENVEOF
            sudo chown bytebrew:bytebrew /etc/bytebrew/cloud-api.env
            sudo chmod 640 /etc/bytebrew/cloud-api.env

      - name: Install and verify
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Install API binary
            sudo mv /tmp/bytebrew-deploy/build/bytebrew-cloud-api /usr/local/bin/bytebrew-cloud-api
            sudo chmod +x /usr/local/bin/bytebrew-cloud-api

            # Install cloud-web frontend
            sudo rm -rf /var/www/bytebrew-cloud-web
            sudo mkdir -p /var/www/bytebrew-cloud-web
            sudo cp -r /tmp/bytebrew-deploy/cloud-web/dist/* /var/www/bytebrew-cloud-web/

            # Install docs site
            sudo rm -rf /var/www/bytebrew-docs/docs/_astro
            sudo cp -r /tmp/bytebrew-deploy/docs-site/dist/* /var/www/bytebrew-docs/docs/

            # Update docs knowledge for MCP RAG
            sudo mkdir -p /etc/bytebrew/docs-knowledge
            find /tmp/bytebrew-deploy/docs-site/src/content/docs -name '*.md' -o -name '*.mdx' | while read f; do
              sudo cp "$f" /etc/bytebrew/docs-knowledge/"$(basename "$f")"
            done

            # Update Caddy config
            if [ -f /tmp/bytebrew-deploy/deploy/Caddyfile ]; then
              sudo cp /tmp/bytebrew-deploy/deploy/Caddyfile /etc/caddy/Caddyfile
              sudo systemctl reload caddy
            fi

            # Load Docker images
            if [ -f /tmp/bytebrew-deploy/build/engine.tar.gz ]; then
              docker load < /tmp/bytebrew-deploy/build/engine.tar.gz
            fi
            if [ -f /tmp/bytebrew-deploy/build/mcp-docs.tar.gz ]; then
              docker load < /tmp/bytebrew-deploy/build/mcp-docs.tar.gz
            fi

            # Restart hosted stack (Engine + MCP docs + examples)
            cd /opt/bytebrew-examples/hosted
            docker compose up -d --remove-orphans

            # Start Cloud API
            sudo systemctl start bytebrew-cloud-api
            rm -rf /tmp/bytebrew-deploy

            # Health checks
            sleep 5
            if ! curl -sf http://127.0.0.1:8080/health; then
              echo "Cloud API health check failed! Rolling back..."
              sudo systemctl stop bytebrew-cloud-api
              sudo mv /usr/local/bin/bytebrew-cloud-api.bak /usr/local/bin/bytebrew-cloud-api
              sudo systemctl start bytebrew-cloud-api
              exit 1
            fi

            # Cleanup
            sudo rm -f /usr/local/bin/bytebrew-cloud-api.bak
