name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
          workdir: bytebrew-srv
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload server artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bytebrew-srv-dist
          path: |
            bytebrew-srv/dist/*.tar.gz
            bytebrew-srv/dist/*.zip
            bytebrew-srv/dist/checksums.txt

  build-client:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            platform_name: linux_amd64
            ext: ""
            archive: tar.gz
          - os: ubuntu-latest
            target: bun-linux-arm64
            platform_name: linux_arm64
            ext: ""
            archive: tar.gz
          - os: macos-latest
            target: bun-darwin-x64
            platform_name: darwin_amd64
            ext: ""
            archive: tar.gz
          - os: macos-latest
            target: bun-darwin-arm64
            platform_name: darwin_arm64
            ext: ""
            archive: tar.gz
          - os: windows-latest
            target: bun-windows-x64
            platform_name: windows_amd64
            ext: ".exe"
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: bytebrew-cli
        run: bun install

      - name: Build bundle
        working-directory: bytebrew-cli
        run: bun run build

      - name: Compile binary
        working-directory: bytebrew-cli
        run: bun build src/index.tsx --compile --target ${{ matrix.target }} --outfile dist/bytebrew${{ matrix.ext }}

      # Windows Code Signing (skipped when secrets are not configured)
      - name: Sign Windows binary
        if: matrix.platform_name == 'windows_amd64'
        shell: pwsh
        run: |
          if ("${{ secrets.WINDOWS_CERT_BASE64 }}" -ne "") {
            $certBytes = [System.Convert]::FromBase64String("${{ secrets.WINDOWS_CERT_BASE64 }}")
            [System.IO.File]::WriteAllBytes("${{ runner.temp }}\cert.pfx", $certBytes)
            & "C:\Program Files (x86)\Windows Kits\10\bin\10.0.22621.0\x64\signtool.exe" sign `
              /f "${{ runner.temp }}\cert.pfx" `
              /p "${{ secrets.WINDOWS_CERT_PASSWORD }}" `
              /tr http://timestamp.digicert.com `
              /td sha256 `
              /fd sha256 `
              /d "ByteBrew AI Agent" `
              bytebrew-cli/dist/bytebrew.exe
            Remove-Item "${{ runner.temp }}\cert.pfx" -Force
            Write-Host "Windows code signing completed"
          } else {
            Write-Host "WINDOWS_CERT_BASE64 not set, skipping code signing"
          }

      # macOS Code Signing + Notarization (skipped when secrets are not configured)
      - name: Sign and notarize macOS binary
        if: startsWith(matrix.platform_name, 'darwin')
        run: |
          if [ -n "${{ secrets.APPLE_CERT_BASE64 }}" ]; then
            echo "Importing certificate..."
            echo "${{ secrets.APPLE_CERT_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/cert.p12"

            security create-keychain -p "build" "$RUNNER_TEMP/build.keychain"
            security default-keychain -s "$RUNNER_TEMP/build.keychain"
            security unlock-keychain -p "build" "$RUNNER_TEMP/build.keychain"
            security import "$RUNNER_TEMP/cert.p12" \
              -k "$RUNNER_TEMP/build.keychain" \
              -P "${{ secrets.APPLE_CERT_PASSWORD }}" \
              -T /usr/bin/codesign
            security set-key-partition-list \
              -S apple-tool:,apple: \
              -s -k "build" "$RUNNER_TEMP/build.keychain"

            echo "Signing binary..."
            codesign --sign "${{ secrets.APPLE_DEVELOPER_ID }}" \
              --options runtime \
              --timestamp \
              bytebrew-cli/dist/bytebrew

            echo "Notarizing..."
            zip -j "$RUNNER_TEMP/bytebrew-notarize.zip" bytebrew-cli/dist/bytebrew
            xcrun notarytool submit "$RUNNER_TEMP/bytebrew-notarize.zip" \
              --apple-id "${{ secrets.APPLE_ID }}" \
              --password "${{ secrets.APPLE_APP_PASSWORD }}" \
              --team-id "${{ secrets.APPLE_TEAM_ID }}" \
              --wait

            echo "Stapling..."
            xcrun stapler staple bytebrew-cli/dist/bytebrew || echo "Stapling not supported for CLI binaries, skipping"

            # Cleanup
            rm -f "$RUNNER_TEMP/cert.p12" "$RUNNER_TEMP/bytebrew-notarize.zip"
            security delete-keychain "$RUNNER_TEMP/build.keychain"
            echo "macOS code signing and notarization completed"
          else
            echo "APPLE_CERT_BASE64 not set, skipping code signing"
          fi

      - name: Read version
        id: version
        shell: bash
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          tar -czf bytebrew_${{ steps.version.outputs.version }}_${{ matrix.platform_name }}.tar.gz \
            -C bytebrew-cli/dist bytebrew${{ matrix.ext }}

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          cd bytebrew-cli/dist
          7z a ../../bytebrew_${{ steps.version.outputs.version }}_${{ matrix.platform_name }}.zip bytebrew${{ matrix.ext }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bytebrew-cli-${{ matrix.platform_name }}
          path: bytebrew_${{ steps.version.outputs.version }}_${{ matrix.platform_name }}.*

  publish:
    needs: [build-server, build-client]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Download server artifacts
        uses: actions/download-artifact@v4
        with:
          name: bytebrew-srv-dist
          path: artifacts

      - name: Download all client artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: bytebrew-cli-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          draft: true
          generate_release_notes: true
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare VPS release directory
        if: vars.DEPLOY_TO_VPS == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            mkdir -p /var/www/releases/v${{ steps.version.outputs.version }}

      - name: Copy release files to VPS
        if: vars.DEPLOY_TO_VPS == 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "artifacts/*"
          target: /var/www/releases/v${{ steps.version.outputs.version }}
          strip_components: 1

      - name: Copy install scripts to VPS
        if: vars.DEPLOY_TO_VPS == 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "scripts/install.sh,scripts/install.ps1"
          target: /var/www/releases
          strip_components: 1

      - name: Finalize VPS release
        if: vars.DEPLOY_TO_VPS == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "${{ steps.version.outputs.version }}" > /var/www/releases/LATEST
            chmod -R a+r /var/www/releases/v${{ steps.version.outputs.version }}
            chmod a+r /var/www/releases/LATEST
            chmod a+rx /var/www/releases/install.sh
            chmod a+r /var/www/releases/install.ps1
