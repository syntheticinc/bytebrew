name: Notify Cloud Deploy

# On every push to main, tell the bytebrew-cloud-web repo that a new engine
# revision is available so its Deploy Cloud workflow rebuilds the engine
# Docker image and ships it to app.bytebrew.ai. Before this workflow
# existed engine commits never reached prod automatically — cloud-web's
# path-filter only watches its own folders.
#
# Uses the same GH_PAT secret already configured in this repo — it just
# needs `actions: read and write` on syntheticinc/bytebrew-cloud-web (in
# addition to contents:read on bytebrew/bytebrew-ee/bytebrew-web-client
# that the cloud-web deploy workflow also uses). One PAT covers both.

on:
  push:
    branches: [main]

concurrency:
  group: notify-cloud-deploy
  cancel-in-progress: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch engine-push to bytebrew-cloud-web
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::GH_PAT secret is not set — Deploy Cloud will not run"
            exit 1
          fi
          curl -sSfL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/syntheticinc/bytebrew-cloud-web/dispatches \
            -d "{\"event_type\":\"engine-push\",\"client_payload\":{\"engine_sha\":\"${{ github.sha }}\",\"message\":\"${{ github.event.head_commit.message }}\"}}"
