name: bytebrew_mobile
description: "ByteBrew AI Agent — Mobile Companion"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2
  go_router: ^17.1.0
  flutter_markdown_plus: ^1.0.7
  google_fonts: ^6.0.0
  intl: ^0.19.0
  highlight: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.3
  build_runner: any

flutter:
  uses-material-design: true
  assets:
    - google_fonts/
