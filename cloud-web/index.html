        <h1>ByteBrew Engine</h1>
        <h2>Ship AI agents in your product — not months of infrastructure</h2>
        <p>Your users get a smart assistant that thinks, uses tools, and remembers context. You get one Docker container and a REST API. Works with any LLM — OpenAI, Gemini, Claude, Llama.</p>

        <h3>What ByteBrew Does</h3>
        <ul>
          <li><strong>Agents that reason and act</strong> — multi-step problem solving with tool calling, not just chat completion</li>
          <li><strong>Any tool, any API</strong> — connect your services via MCP protocol or declare tools in YAML</li>
          <li><strong>Multiple agents working together</strong> — supervisor delegates to specialized sub-agents automatically</li>
          <li><strong>Session memory</strong> — conversations persist across requests</li>
          <li><strong>Background automation</strong> — cron schedules and webhook triggers</li>
          <li><strong>Knowledge base (RAG)</strong> — upload documents, agents search them via vector search</li>
          <li><strong>Visual Admin Dashboard</strong> — create agents, configure models, manage tools without code</li>
          <li><strong>Any LLM</strong> — OpenAI, Anthropic, Google, Ollama, or any OpenAI-compatible provider</li>
        </ul>

        <h3>Quick Start</h3>
        <pre>curl -fsSL https://bytebrew.ai/releases/docker-compose.yml -o docker-compose.yml && docker compose up -d</pre>
        <p>Includes PostgreSQL. No external dependencies. Free forever — no agent limits, no session limits.</p>
