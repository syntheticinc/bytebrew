server:
  port: 8080

cloud_api:
  base_url: "http://localhost:60402"
  # auth_token: "" # relay service account token for Cloud API

cache:
  ttl: "5m"
  grace_period: "30m"
  persist_path: "/var/lib/bytebrew-relay/cache.json"

sessions:
  heartbeat_timeout: "5m"
  cleanup_interval: "1m"

logging:
  level: "info"
