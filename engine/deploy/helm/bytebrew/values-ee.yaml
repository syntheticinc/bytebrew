# Example values for ByteBrew EE (on-prem) edition.
# Use with: helm install bytebrew . -f values.yaml -f values-ee.yaml
#
# ByteBrew EE extends CE with SSO, audit logging, and Prometheus metrics.
# The EE binary (bytebrew/engine-ee) is distributed separately under a
# commercial license. Contact sales@bytebrew.ai for access.

image:
  repository: bytebrew/engine-ee
  tag: v1.0.0

config:
  auth:
    mode: external
    jwtPublicKeyPath: /etc/bytebrew/jwt/ee-public.key
    # Mount the public key via a ConfigMap or Secret, for example:
    #   kubectl create configmap bytebrew-ee-pubkey \
    #     --from-file=ee-public.key=./ee-public.key
    # Then add to deployment via extraVolumes / extraVolumeMounts.

persistence:
  keys:
    # External auth mode generates keypairs in the IdP — no local keypair needed.
    enabled: false

# Additional EE-specific resources (license verification, audit exporter,
# Prometheus metrics) are configured via the EE Helm overlay in the
# bytebrew-ee/deploy/helm-overlay/ directory (commercial, separate repo).
