---
# Test-only Postgres with pgvector extension for chart-test smoke.
# NEVER use these credentials outside of CI / local kind smoke.
#
# admin-token is a fixed bb_<64-hex> string so smoke can call engine REST.
# Engine v1.0.2+ validates the format and seeds the SHA-256 hash into
# api_tokens at boot.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
type: Opaque
stringData:
  password: kind-test-password
  # Key MUST be `token` — configApply Job hardcodes this key name.
  # Same Secret feeds both engine bootstrapAdminToken seed and brewctl Bearer auth.
  # gitleaks:allow trufflehog:ignore — fixed test value, never used outside ephemeral kind.
  # Excluded from `helm package` artefact via .helmignore (verified with tar -tzf).
  token: bb_bf2f550a52aee1844d2ac42df2768641090b7c52aeae985b305e3340deca5209
  DATABASE_URL: postgres://bytebrew:kind-test-password@postgres-pgvector:5432/bytebrew?sslmode=disable
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-scripts
data:
  01-bytebrew.sql: |
    -- Idempotent setup — script may re-run on repeated kind smoke runs sharing data dir.
    -- pg_roles + pg_database lookups guard CREATE statements against duplicate-key errors.
    SELECT 'CREATE USER bytebrew WITH PASSWORD ''kind-test-password'''
      WHERE NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'bytebrew')\gexec
    SELECT 'CREATE DATABASE bytebrew OWNER bytebrew'
      WHERE NOT EXISTS (SELECT 1 FROM pg_database WHERE datname = 'bytebrew')\gexec
    \c bytebrew
    GRANT ALL ON SCHEMA public TO bytebrew;
    CREATE EXTENSION IF NOT EXISTS vector;
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-pgvector
  labels:
    app: postgres-pgvector
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  selector:
    app: postgres-pgvector
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-pgvector
spec:
  serviceName: postgres-pgvector
  replicas: 1
  selector:
    matchLabels:
      app: postgres-pgvector
  template:
    metadata:
      labels:
        app: postgres-pgvector
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg16
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: postgres-superuser-pwd
            - name: POSTGRES_DB
              value: postgres
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
          # Probe must verify init scripts finished — pg_isready returns OK as
          # soon as the process accepts connections, BEFORE init scripts run.
          # Without this guard the chart's helm install starts while bytebrew
          # user/db don't exist yet → migrations Job fails authentication.
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - 'pg_isready -U postgres && psql -U postgres -tc "SELECT 1 FROM pg_database WHERE datname=''bytebrew''" | grep -q 1'
            periodSeconds: 5
            failureThreshold: 24
            initialDelaySeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
      volumes:
        - name: init-scripts
          configMap:
            name: postgres-init-scripts
        - name: data
          emptyDir: {}
