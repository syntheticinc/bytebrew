replicaCount: 1

image:
  repository: bytebrew/engine
  tag: "latest"
  pullPolicy: IfNotPresent

imagePullSecrets: []

service:
  type: ClusterIP
  port: 8443

ingress:
  enabled: false
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/session-cookie-name: "bytebrew-sticky"
    nginx.ingress.kubernetes.io/session-cookie-hash: "sha1"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
  hosts:
    - host: bytebrew.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

postgresql:
  # External PostgreSQL (recommended for production)
  external:
    host: ""
    port: 5432
    database: bytebrew
    username: bytebrew
    password: ""
    sslmode: disable
    # existingSecret: ""  # alternative to password

config:
  # agents.yaml content (mounted as ConfigMap)
  agents: ""

  # Auth mode: "local" or "external"
  # local   — engine auto-generates an Ed25519 keypair on first boot and stores it
  #           under auth.jwtKeysPath (must be a persistent volume). Single-replica only.
  # external — engine receives only the public key via auth.jwtPublicKeyPath; the
  #           private key lives in an external identity service (e.g. bytebrew Cloud).
  auth:
    mode: "local"
    # PVC mount path where the local-mode keypair is persisted.
    # Files written: jwt_ed25519.priv (0600) and jwt_ed25519.pub (0644)
    jwtKeysPath: "/var/lib/bytebrew/keys"
    # Path to the Ed25519 public-key file (hex-encoded).
    # Used only when auth.mode = "external". Mount via a ConfigMap or Secret.
    jwtPublicKeyPath: ""

  # License
  licensePath: /etc/bytebrew/license.jwt

  # Embedding model
  embedURL: ""
  embedModel: nomic-embed-text
  embedDim: 768

secrets:
  # LLM provider credentials are not supplied via Helm — configure them
  # post-install through the Admin Dashboard onboarding wizard or
  # Admin → Models. Engine does not read LLM env vars.

  # Cloud-mode metering HMAC secrets (EE/Cloud binary only).
  # meteringHMACCurrent is required when cloud metering is enabled.
  # meteringHMACPrevious is set only during a 90-day key rotation window;
  # remove it once all engine pods have been rolled with the new current key.
  meteringHMACCurrent: ""
  meteringHMACPrevious: ""  # leave empty when no rotation is in progress

persistence:
  # Ed25519 keypair storage (local auth mode only).
  # Must be ReadWriteOnce and persisted across pod restarts.
  # WARNING: local auth mode supports only replicaCount=1.
  # For HA deployments use auth.mode=external.
  keys:
    enabled: true
    size: 1Mi
    storageClass: ""
    accessMode: ReadWriteOnce

  # Knowledge base storage
  knowledge:
    enabled: false
    size: 1Gi
    storageClass: ""
    accessMode: ReadWriteOnce

resources:
  limits:
    cpu: 2000m
    memory: 2Gi
  requests:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

serviceMonitor:
  enabled: false
  interval: 30s
  path: /metrics

nodeSelector: {}
tolerations: []
affinity: {}
