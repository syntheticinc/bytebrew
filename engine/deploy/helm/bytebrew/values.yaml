replicaCount: 1

image:
  repository: bytebrew/engine
  tag: "latest"
  pullPolicy: IfNotPresent

imagePullSecrets: []

service:
  type: ClusterIP
  port: 8443

ingress:
  enabled: false
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/session-cookie-name: "bytebrew-sticky"
    nginx.ingress.kubernetes.io/session-cookie-hash: "sha1"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
  hosts:
    - host: bytebrew.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

postgresql:
  # External PostgreSQL (recommended for production)
  external:
    host: ""
    port: 5432
    database: bytebrew
    username: bytebrew
    password: ""
    sslmode: disable
    # existingSecret: ""  # alternative to password

config:
  # agents.yaml content (mounted as ConfigMap)
  agents: ""

  # JWT signing secret (required)
  # Admin users are created via: kubectl exec <pod> -- bytebrew-ce admin create --username admin --password <pass>
  jwtSecret: ""

  # License
  licensePath: /etc/bytebrew/license.jwt

  # Embedding model
  embedURL: ""
  embedModel: nomic-embed-text
  embedDim: 768

secrets:
  # LLM provider API keys
  llmAPIKeys: {}
  #  openai: sk-xxx
  #  anthropic: sk-ant-xxx

persistence:
  # Knowledge base storage
  knowledge:
    enabled: false
    size: 1Gi
    storageClass: ""
    accessMode: ReadWriteOnce

resources:
  limits:
    cpu: 2000m
    memory: 2Gi
  requests:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

serviceMonitor:
  enabled: false
  interval: 30s
  path: /metrics

nodeSelector: {}
tolerations: []
affinity: {}
