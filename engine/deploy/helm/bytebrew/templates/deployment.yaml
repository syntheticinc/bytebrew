apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bytebrew-engine.fullname" . }}
  labels:
    {{- include "bytebrew-engine.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "bytebrew-engine.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if not .Values.postgresql.external.existingSecret }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "bytebrew-engine.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "bytebrew-engine.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.extraInitContainers }}
      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: engine
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: 8443
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "bytebrew-engine.databaseSecretName" . }}
                  key: {{ include "bytebrew-engine.databaseSecretKey" . }}
            - name: BYTEBREW_AUTH_MODE
              value: {{ .Values.config.auth.mode | quote }}
            {{- if eq .Values.config.auth.mode "local" }}
            - name: BYTEBREW_JWT_KEYS_DIR
              value: {{ .Values.config.auth.jwtKeysPath | quote }}
            {{- end }}
            {{- if eq .Values.config.auth.mode "external" }}
            - name: BYTEBREW_JWT_PUBLIC_KEY_PATH
              value: {{ .Values.config.auth.jwtPublicKeyPath | quote }}
            {{- end }}
            {{- if .Values.config.embedURL }}
            - name: EMBED_URL
              value: {{ .Values.config.embedURL | quote }}
            - name: EMBED_MODEL
              value: {{ .Values.config.embedModel | quote }}
            - name: EMBED_DIM
              value: {{ .Values.config.embedDim | quote }}
            {{- end }}
            {{- if .Values.bootstrapAdminToken.enabled }}
            - name: BYTEBREW_BOOTSTRAP_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ required "bootstrapAdminToken.existingSecret is required when bootstrapAdminToken.enabled=true" .Values.bootstrapAdminToken.existingSecret }}
                  key: {{ .Values.bootstrapAdminToken.existingSecretKey | default "token" }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            {{- if .Values.config.agents }}
            - name: config
              mountPath: /etc/bytebrew/agents.yaml
              subPath: agents.yaml
              readOnly: true
            {{- end }}
            {{- if and (eq .Values.config.auth.mode "local") .Values.persistence.keys.enabled }}
            - name: keys
              mountPath: {{ .Values.config.auth.jwtKeysPath | quote }}
            {{- end }}
            {{- if .Values.persistence.knowledge.enabled }}
            - name: knowledge
              mountPath: /etc/bytebrew/knowledge
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        {{- if .Values.config.agents }}
        - name: config
          configMap:
            name: {{ include "bytebrew-engine.fullname" . }}-config
        {{- end }}
        {{- if and (eq .Values.config.auth.mode "local") .Values.persistence.keys.enabled }}
        - name: keys
          persistentVolumeClaim:
            claimName: {{ include "bytebrew-engine.fullname" . }}-keys
        {{- end }}
        {{- if .Values.persistence.knowledge.enabled }}
        - name: knowledge
          persistentVolumeClaim:
            claimName: {{ include "bytebrew-engine.fullname" . }}-knowledge
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
