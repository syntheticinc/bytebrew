apiVersion: v1
kind: Secret
metadata:
  name: {{ include "bytebrew-engine.fullname" . }}-secrets
  labels:
    {{- include "bytebrew-engine.labels" . | nindent 4 }}
type: Opaque
data:
  database-url: {{ include "bytebrew-engine.databaseURL" . | b64enc | quote }}
  admin-password: {{ .Values.config.adminPassword | b64enc | quote }}
  {{- range $provider, $key := .Values.secrets.llmAPIKeys }}
  llm-api-key-{{ $provider }}: {{ $key | b64enc | quote }}
  {{- end }}
