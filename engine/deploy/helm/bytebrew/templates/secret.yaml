apiVersion: v1
kind: Secret
metadata:
  name: {{ include "bytebrew-engine.fullname" . }}-secrets
  labels:
    {{- include "bytebrew-engine.labels" . | nindent 4 }}
type: Opaque
data:
  database-url: {{ include "bytebrew-engine.databaseURL" . | b64enc | quote }}
  {{- if .Values.secrets.meteringHMACCurrent }}
  metering-hmac-current: {{ .Values.secrets.meteringHMACCurrent | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.meteringHMACPrevious }}
  metering-hmac-previous: {{ .Values.secrets.meteringHMACPrevious | b64enc | quote }}
  {{- end }}
