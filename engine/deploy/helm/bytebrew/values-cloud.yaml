# Example values for ByteBrew Cloud (managed multi-tenant) edition.
# Use with: helm install bytebrew . -f values.yaml -f values-cloud.yaml
#
# Cloud mode runs the engine in multi-tenant configuration. JWT tokens are
# issued by the Cloud identity service (external auth mode). Scale horizontally
# — local keypair storage is disabled. Autoscaling and ServiceMonitor enabled
# by default for production-grade observability.

image:
  repository: bytebrew/engine-cloud
  tag: v1.0.0

replicaCount: 3

config:
  auth:
    mode: external
    jwtPublicKeyPath: /etc/bytebrew/jwt/cloud-public.key

persistence:
  keys:
    # Cloud auth mode uses an external IdP — no local keypair PVC needed.
    enabled: false

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

resources:
  limits:
    cpu: 4000m
    memory: 4Gi
  requests:
    cpu: 1000m
    memory: 1Gi

serviceMonitor:
  enabled: true

# Note: Cloud-specific resources (metering exporter, tenant Reconciler,
# quota CronJob) are provided by the EE Helm overlay in the
# bytebrew-ee/deploy/helm-overlay/ directory (commercial, separate repo).
