services:
  engine:
    build:
      context: .
      dockerfile: Dockerfile.test
    ports:
      - "9555:8443"
    environment:
      - DATABASE_URL=postgresql://bytebrew:bytebrew@db:5432/bytebrew_sse_test?sslmode=disable
      - ADMIN_USER=admin
      - ADMIN_PASSWORD=admin123
      - LLM_PROVIDER=openrouter
      - LLM_API_KEY=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
      - LLM_MODEL=qwen/qwen3-coder-next
      - TAVILY_API_KEY=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
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: bytebrew
      POSTGRES_PASSWORD: bytebrew
      POSTGRES_DB: bytebrew_sse_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bytebrew -d bytebrew_sse_test"]
      interval: 3s
      timeout: 3s
      retries: 10
    restart: "no"
