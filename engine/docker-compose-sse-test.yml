services:
  engine:
    build:
      context: .
      dockerfile: Dockerfile.test
    ports:
      - "9555:8443"
    environment:
      - DATABASE_URL=postgresql://bytebrew:bytebrew@db:5432/bytebrew_sse_test?sslmode=disable
      # Engine auth: Ed25519 auto-generated on first boot. No JWT_SECRET needed.
      - BYTEBREW_AUTH_MODE=local
      - BYTEBREW_JWT_KEYS_DIR=/var/lib/bytebrew/keys
      - LLM_PROVIDER=openrouter
      - LLM_API_KEY=${LLM_API_KEY}           # set in .env or shell
      - LLM_MODEL=qwen/qwen3-coder-next
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    restart: "no"

  mock-mcp:
    build:
      context: .
      dockerfile: testdata/mock-mcp-http/Dockerfile
    ports:
      - "9556:9556"
    environment:
      - LOG_FILE=/tmp/mcp-requests.jsonl
    restart: "no"

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: bytebrew
      POSTGRES_PASSWORD: bytebrew
      POSTGRES_DB: bytebrew_sse_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bytebrew -d bytebrew_sse_test"]
      interval: 3s
      timeout: 3s
      retries: 10
    restart: "no"

  db-migrate:
    image: liquibase/liquibase:4.30
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./migrations:/liquibase/changelog
    command: >
      --url=jdbc:postgresql://db:5432/bytebrew_sse_test
      --username=bytebrew
      --password=bytebrew
      --changeLogFile=db.changelog-master.yaml
      --searchPath=/liquibase/changelog
      update
    restart: "no"
