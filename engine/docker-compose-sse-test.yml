services:
  engine:
    build:
      context: .
      dockerfile: Dockerfile.test
    ports:
      - "9555:8443"
    environment:
      - DATABASE_URL=postgresql://bytebrew:bytebrew@db:5432/bytebrew_sse_test?sslmode=disable
      - ADMIN_USER=admin
      - ADMIN_PASSWORD=admin123
      - LLM_PROVIDER=openrouter
      - LLM_API_KEY=${LLM_API_KEY}           # set in .env or shell
      - LLM_MODEL=qwen/qwen3-coder-next
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  mock-mcp:
    build:
      context: .
      dockerfile: testdata/mock-mcp-http/Dockerfile
    ports:
      - "9556:9556"
    environment:
      - LOG_FILE=/tmp/mcp-requests.jsonl
    restart: "no"

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: bytebrew
      POSTGRES_PASSWORD: bytebrew
      POSTGRES_DB: bytebrew_sse_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bytebrew -d bytebrew_sse_test"]
      interval: 3s
      timeout: 3s
      retries: 10
    restart: "no"
