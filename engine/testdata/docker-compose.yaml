services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: bytebrew_test
      POSTGRES_USER: bytebrew
      POSTGRES_PASSWORD: bytebrew
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bytebrew -d bytebrew_test"]
      interval: 2s
      timeout: 2s
      retries: 10
