databaseChangeLog:
  # V2 Gate removal — Commit Group A.
  #
  # Gates (join/fork/condition control-flow nodes) are out of V2.
  # See docs/architecture/agent-first-runtime.md §3 and
  # docs/plan/v2-cleanup-checklist.md (Commit Group A).
  #
  # Clean-schema policy: pure DDL only (DROP TABLE IF EXISTS).
  # No data preservation — the gates table held ephemeral flow-control
  # config that has no V2 equivalent. Multi-delegation joining is
  # implicit wait_all via Eino parallel tool-call semantics (§3.1),
  # so agents.join_policy is explicitly NOT added either.
  #
  # Idempotent: applies cleanly on fresh DBs (no-op) and on pre-V2 DBs
  # that have the GORM-auto-migrated `gates` table.
  - changeSet:
      id: 009-v2-drop-gates
      author: system
      changes:
        - sql:
            sql: |
              DROP TABLE IF EXISTS gates;
      rollback:
        - sql:
            sql: |
              -- Gates are out of V2 and cannot be restored via Liquibase.
              -- If rollback is truly needed, restore from a pre-V2 backup.
              SELECT 1;
