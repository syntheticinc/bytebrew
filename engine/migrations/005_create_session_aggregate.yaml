databaseChangeLog:
  - changeSet:
      id: 005-create-chat-session-table
      author: system
      changes:
        - createTable:
            tableName: chat_session
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_chat_session_user
                    references: user(id)
              - column:
                  name: project_id
                  type: uuid
                  constraints:
                    foreignKeyName: fk_chat_session_project
                    references: project(id)
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  defaultValueComputed: now()
                  constraints:
                    nullable: false

  - changeSet:
      id: 005-create-message-table
      author: system
      changes:
        - createTable:
            tableName: message
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: session_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_message_session
                    references: chat_session(id)
              - column:
                  name: message_type
                  type: message_type
                  constraints:
                    nullable: false
              - column:
                  name: sender
                  type: varchar(255)
              - column:
                  name: content
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: metadata
                  type: jsonb
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
