databaseChangeLog:
  - changeSet:
      id: 030-flowtype-purge
      author: bytebrew
      comment: >
        Group Q.4: FlowType purge + agent_runs/agent_context_snapshots restructure.
        agent_runs: flow_type varchar -> agent_id uuid, subtask_id varchar -> task_id uuid.
        agent_context_snapshots: flow_type varchar -> agent_id uuid (already done in Q.1).
      changes:
        - sql:
            sql: >
              ALTER TABLE agent_runs DROP COLUMN IF EXISTS flow_type;
              ALTER TABLE agent_runs DROP COLUMN IF EXISTS subtask_id;

              ALTER TABLE agent_context_snapshots DROP COLUMN IF EXISTS flow_type;
