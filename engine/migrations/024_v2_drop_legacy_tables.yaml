            sql: |
              DROP TABLE IF EXISTS runtime_sessions;
      rollback:
        - sql:
            sql: |
              SELECT 1;

  - changeSet:
      id: 024-v2-drop-agent-spawn-targets
      author: system
      changes:
        - sql:
            sql: |
              DROP TABLE IF EXISTS agent_spawn_targets;
      rollback:
        - sql:
            sql: |
              SELECT 1;

  - changeSet:
      id: 024-v2-drop-tenants
      author: system
      changes:
        - sql:
            sql: |
              DROP TABLE IF EXISTS tenants;
      rollback:
        - sql:
            sql: |
              SELECT 1;
