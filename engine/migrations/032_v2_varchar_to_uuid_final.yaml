databaseChangeLog:
  - changeSet:
      id: 032-varchar-to-uuid-final
      author: bytebrew
      comment: >
        Group Q.6: Final varchar→uuid type alignment for 10 columns that
        store UUID strings as character varying. All values are valid UUIDs
        (generated via uuid.New().String()). Pure DDL type cast.
      changes:
        - sql:
            sql: >
              ALTER TABLE sessions ALTER COLUMN id TYPE uuid USING id::uuid;

              ALTER TABLE agent_context_snapshots ALTER COLUMN id TYPE uuid USING id::uuid;
              ALTER TABLE agent_context_snapshots ALTER COLUMN session_id TYPE uuid USING session_id::uuid;

              ALTER TABLE agent_runs ALTER COLUMN id TYPE uuid USING id::uuid;
              ALTER TABLE agent_runs ALTER COLUMN session_id TYPE uuid USING session_id::uuid;

              ALTER TABLE audit_logs ALTER COLUMN session_id TYPE uuid USING session_id::uuid;

              ALTER TABLE knowledge_documents ALTER COLUMN id TYPE uuid USING id::uuid;

              ALTER TABLE knowledge_chunks ALTER COLUMN id TYPE uuid USING id::uuid;

              ALTER TABLE session_event_log ALTER COLUMN session_id TYPE uuid USING session_id::uuid;

              ALTER TABLE tasks ALTER COLUMN session_id TYPE uuid USING session_id::uuid;
