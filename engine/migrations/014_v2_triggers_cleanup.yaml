databaseChangeLog:
  # V2 triggers cleanup — Commit Group D.
  #
  # Target schema (`bytebrew/docs/database/target-schema.dbml`) collapses the
  # type-specific trigger config into a single `config jsonb` column and
  # removes the on_complete webhook feature entirely. See
  # `docs/architecture/agent-first-runtime.md` §4.1 / §4.2.
  #
  # - schedule / webhook_path → config.{schedule, webhook_path}
  # - on_complete_url / on_complete_headers → removed (no replacement; if the
  #   use case returns it will be an MCP webhook tool call from the agent).
  # - last_fired_at stays; it is now driven by TriggerRepository.MarkFired
  #   from cron ticks, webhook handlers, and chat entry dispatchers.
  # - schema_id gets ON DELETE CASCADE (a trigger without a schema is
  #   orphaned — it cannot route to an entry agent).
  #
  # Clean-schema policy: pure DDL — ADD / DROP COLUMN + FK constraint
  # replacement. No backfill (multi-step ALTERs are forbidden by the V2
  # cleanup policy).
  #
  # Idempotent: applies cleanly on fresh DBs (ADD COLUMN IF NOT EXISTS +
  # DROP COLUMN IF EXISTS) and on pre-V2 DBs that have the legacy columns.
  - changeSet:
      id: 014-v2-triggers-cleanup
      author: system
      changes:
        - sql:
            sql: |
              ALTER TABLE triggers ADD COLUMN IF NOT EXISTS config jsonb NOT NULL DEFAULT '{}';
              ALTER TABLE triggers DROP COLUMN IF EXISTS schedule;
              ALTER TABLE triggers DROP COLUMN IF EXISTS webhook_path;
              ALTER TABLE triggers DROP COLUMN IF EXISTS on_complete_url;
              ALTER TABLE triggers DROP COLUMN IF EXISTS on_complete_headers;
              -- Replace schema_id FK with ON DELETE CASCADE. Drop the legacy
              -- FK (SET NULL) first; then recreate with the V2 semantics.
              -- Both statements guarded so a fresh DB without the legacy FK
              -- (pre-GORM-seeded or already-V2) applies cleanly.
              DO $$
              DECLARE
                legacy_fk text;
              BEGIN
                SELECT conname INTO legacy_fk
                  FROM pg_constraint
                  WHERE conrelid = 'triggers'::regclass
                    AND contype = 'f'
                    AND conkey = (SELECT array_agg(attnum) FROM pg_attribute
                                    WHERE attrelid = 'triggers'::regclass
                                      AND attname = 'schema_id');
                IF legacy_fk IS NOT NULL THEN
                  EXECUTE format('ALTER TABLE triggers DROP CONSTRAINT %I', legacy_fk);
                END IF;
              END $$;
              ALTER TABLE triggers
                ADD CONSTRAINT triggers_schema_id_fkey
                FOREIGN KEY (schema_id) REFERENCES schemas(id) ON DELETE CASCADE;
      rollback:
        - sql:
            sql: |
              -- Rolling back loses the collapsed config jsonb and cannot
              -- recover the dropped on_complete_url / on_complete_headers
              -- values. If rollback is truly needed, restore from a pre-V2
              -- backup.
              SELECT 1;
