databaseChangeLog:
  # V2 settings final shape — Commit Group G (§5.8).
  #
  # Target schema (`bytebrew/docs/database/target-schema.dbml` Table settings):
  #   tenant_id  uuid   NOT NULL DEFAULT '00000000-0000-0000-0000-000000000001'
  #   key        varchar(255) NOT NULL
  #   value      jsonb  NOT NULL DEFAULT '{}'
  #   updated_at timestamptz NOT NULL DEFAULT now()
  #   PRIMARY KEY (tenant_id, key)
  #
  # The legacy `settings` table (pre-V2) used `key` as the sole primary key,
  # `value` as TEXT, and historically had a `scope` column that was redundant
  # with tenant_id. This changeset reaches the final shape via pure DDL —
  # no data backfill (clean-schema policy).
  #
  # Idempotent in both directions:
  #   - Fresh DB: creates the table with the final shape directly.
  #   - Pre-V2 DB: drops the legacy scope column, drops the old key-only PK,
  #     adds tenant_id with the default tenant, casts value to jsonb, and
  #     installs the (tenant_id, key) composite PK.
  #
  # Why per-tenant + jsonb:
  # - Per-tenant prepares for Cloud multi-tenancy. CE uses the default
  #   tenant sentinel for every row; the column shape is identical.
  # - jsonb lets us store structured values (e.g. byok.allowed_providers as
  #   a real array) instead of string-munging.
  #
  # Defense-in-depth: `internal/infrastructure/persistence/models/migrate.go`
  # also drops the legacy `scope` column via DropColumn IF EXISTS at boot.
  #
  # See `docs/architecture/agent-first-runtime.md §5.8 "Settings + BYOK"` and
  # `docs/plan/v2-cleanup-checklist.md` "Commit Group G".
  - changeSet:
      id: 018-v2-settings-final-shape
      author: system
      changes:
        # 1) Create the table with the final shape on fresh installs.
        #    Pre-existing rows are untouched here (handled by steps 2-6).
        - sql:
            sql: |
              CREATE TABLE IF NOT EXISTS settings (
                  tenant_id   uuid         NOT NULL DEFAULT '00000000-0000-0000-0000-000000000001',
                  key         varchar(255) NOT NULL,
                  value       jsonb        NOT NULL DEFAULT '{}'::jsonb,
                  updated_at  timestamptz  NOT NULL DEFAULT now(),
                  PRIMARY KEY (tenant_id, key)
              );
        # 2) Drop the legacy `scope` column if it lingers from a pre-V2 DB.
        #    Redundant with tenant_id in the V2 model.
        - sql:
            sql: |
              ALTER TABLE IF EXISTS settings
                  DROP COLUMN IF EXISTS scope;
        # 3) Add tenant_id to a pre-V2 settings table that was keyed by
        #    `key` alone. The default sentinel matches the V2 default tenant.
        - sql:
            sql: |
              ALTER TABLE IF EXISTS settings
                  ADD COLUMN IF NOT EXISTS tenant_id uuid
                  NOT NULL DEFAULT '00000000-0000-0000-0000-000000000001';
        # 4) Coerce `value` to jsonb when a pre-V2 DB has it as text.
        #    `to_jsonb(value)` wraps an arbitrary string as a jsonb string,
        #    which is safe and reversible. The USING clause is a no-op when
        #    the column is already jsonb (cast jsonb -> jsonb is identity).
        - sql:
            sql: |
              ALTER TABLE IF EXISTS settings
                  ALTER COLUMN value TYPE jsonb USING to_jsonb(value);
        # 5) Drop the legacy single-column primary key if present, then
        #    install the (tenant_id, key) composite PK. The constraint name
        #    `settings_pkey` is the PostgreSQL default for `PRIMARY KEY` on a
        #    table named `settings` (used by the original key-only PK).
        #    Safe to run on a fresh DB: step 1 already created the composite
        #    PK with name `settings_pkey`, so the DROP+ADD becomes a no-op
        #    rebuild — same constraint shape, same name.
        - sql:
            sql: |
              ALTER TABLE IF EXISTS settings
                  DROP CONSTRAINT IF EXISTS settings_pkey;
        - sql:
            sql: |
              ALTER TABLE IF EXISTS settings
                  ADD PRIMARY KEY (tenant_id, key);
        # 6) Companion index from the target schema — supports tenant-scoped
        #    list queries even when no specific key is filtered.
        - sql:
            sql: |
              CREATE INDEX IF NOT EXISTS idx_settings_tenant
                  ON settings (tenant_id);
      rollback:
        - sql:
            sql: |
              -- Rolling back drops the V2 shape entirely. The clean-schema
              -- policy means there is no data preservation across rollbacks
              -- — restore from a pre-V2 backup if regression is required.
              DROP TABLE IF EXISTS settings;
