databaseChangeLog:
  # V2 edges → agent_relations rename + drop type column — Commit Group A.1.
  #
  # Target schema (`bytebrew/docs/database/target-schema.dbml`) defines a single
  # `agent_relations` table with NO `type` column: there is exactly one
  # relationship type — DELEGATION — expressed implicitly via the agent-first
  # runtime (orchestrator delegates to target via a tool call, see
  # `docs/architecture/agent-first-runtime.md` §3.1).
  #
  # The legacy `edges` table modelled flow/transfer/parallel as a workflow-engine
  # schema-level type. Post-Group A (Gates removal) and post-EdgeTypeLoop removal
  # only flow/transfer/parallel remained, all of which are now expressed as
  # delegation tool calls — there is no schema-level type left to encode.
  #
  # Clean-schema policy: pure DDL — RENAME TABLE + DROP COLUMN.
  # No data preservation, no per-row backfill (multi-step ALTERs are forbidden by
  # the V2 cleanup policy; this is a single forward-only schema reshape).
  #
  # Idempotent: applies cleanly on fresh DBs (no-op when `edges` is absent — the
  # GORM AutoMigrate will create `agent_relations` directly), and on pre-V2 DBs
  # that have the GORM-auto-migrated `edges` table.
  - changeSet:
      id: 012-v2-rename-edges-to-agent-relations
      author: system
      changes:
        - sql:
            sql: |
              ALTER TABLE IF EXISTS edges RENAME TO agent_relations;
              ALTER TABLE IF EXISTS agent_relations DROP COLUMN IF EXISTS type;
              ALTER INDEX IF EXISTS idx_edges_schema_id RENAME TO idx_agent_relations_schema_id;
      rollback:
        - sql:
            sql: |
              -- Rolling back the rename is supported, but the dropped `type`
              -- column cannot be restored via Liquibase (the legacy enum values
              -- are gone). If rollback is truly needed, restore from a pre-V2
              -- backup.
              ALTER TABLE IF EXISTS agent_relations RENAME TO edges;
