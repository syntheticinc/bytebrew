syntax = "proto3";

package bytebrew.v1;

import "common.proto";

option go_package = "github.com/syntheticinc/bytebrew/engine/api/proto/gen;bytebrewv1";

// IndexingService handles code indexing from client to server
// Note: Indexing happens on CLIENT side, server only stores metadata
service IndexingService {
  // IndexCodebase receives code chunks and metadata from client
  rpc IndexCodebase(stream IndexCodebaseRequest) returns (stream IndexCodebaseResponse);
}

// IndexCodebaseRequest represents a batch of code chunks to index
message IndexCodebaseRequest {
  string user_id = 1;
  string project_key = 2;
  repeated CodeChunk chunks = 3;
  ProjectMetadata project_metadata = 4;
  bool is_first_batch = 5;
  bool is_last_batch = 6;
}

// IndexCodebaseResponse provides progress updates
message IndexCodebaseResponse {
  Status status = 1;
  int32 indexed_count = 2;
  int32 total_count = 3;
  float progress_percent = 4;
  Error error = 5;
  string message = 6;
}
