name: bytebrew_mobile
description: "ByteBrew AI Agent — Mobile Companion"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2
  go_router: ^17.1.0
  flutter_markdown_plus: ^1.0.7
  google_fonts: ^6.0.0
  intl: ^0.19.0
  highlight: ^0.7.0
  web_socket_channel: ^3.0.2
  http: ^1.3.0
  sqflite: ^2.4.2
  shared_preferences: ^2.3.0
  cryptography: ^2.7.0
  flutter_secure_storage: ^9.2.4
  mobile_scanner: ^6.0.0
  marionette_flutter: ^0.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.3
  build_runner: any
  fake_async: ^1.3.2
  marionette_mcp: ^0.3.0

flutter:
  uses-material-design: true
  assets:
    - google_fonts/
