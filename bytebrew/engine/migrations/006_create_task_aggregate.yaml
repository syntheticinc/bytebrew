databaseChangeLog:
  - changeSet:
      id: 006-create-task-table
      author: system
      changes:
        - createTable:
            tableName: task
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: code
                  type: varchar(50)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: title
                  type: varchar(500)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: text
              - column:
                  name: task_type
                  type: task_type
                  constraints:
                    nullable: false
              - column:
                  name: parent_task_id
                  type: uuid
                  constraints:
                    foreignKeyName: fk_task_parent
                    references: task(id)
              - column:
                  name: session_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_task_session
                    references: chat_session(id)
              - column:
                  name: status
                  type: task_status
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  defaultValueComputed: now()
                  constraints:
                    nullable: false

  - changeSet:
      id: 006-create-task-artifact-table
      author: system
      changes:
        - createTable:
            tableName: task_artifact
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: task_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_task_artifact_task
                    references: task(id)
              - column:
                  name: artifact_type
                  type: artifact_type
                  constraints:
                    nullable: false
              - column:
                  name: content
                  type: jsonb
                  constraints:
                    nullable: false
              - column:
                  name: file_path
                  type: varchar(500)
              - column:
                  name: created_by_agent
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
