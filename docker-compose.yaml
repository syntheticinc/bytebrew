services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bytebrew
      POSTGRES_USER: bytebrew
      POSTGRES_PASSWORD: bytebrew
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bytebrew"]
      interval: 5s
      timeout: 5s
      retries: 5

  engine:
    build:
      context: ./engine
      dockerfile: Dockerfile
    ports:
      - "8443:8443"
    environment:
      - BYTEBREW_ADMIN_USER=admin
      - BYTEBREW_ADMIN_PASSWORD=${BYTEBREW_ADMIN_PASSWORD:?BYTEBREW_ADMIN_PASSWORD is required}
      - DB_USER=bytebrew
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
