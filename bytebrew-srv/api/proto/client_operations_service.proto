syntax = "proto3";

package bytebrew.v1;

import "common.proto";

option go_package = "github.com/syntheticinc/bytebrew/bytebrew-srv/api/proto/gen;bytebrewv1";

// ClientOperationsService handles operations that server requests from client
// All file operations and terminal execution happen on the client side
service ClientOperationsService {
  // ReadFile reads a file from the client's filesystem
  rpc ReadFile(ReadFileRequest) returns (ReadFileResponse);

  // SearchCode performs vector search on the client's Qdrant instance
  rpc SearchCode(SearchCodeRequest) returns (SearchCodeResponse);

  // GetProjectTree returns the project file tree with descriptions
  rpc GetProjectTree(GetProjectTreeRequest) returns (GetProjectTreeResponse);

  // GrepSearch performs pattern-based search using ripgrep
  rpc GrepSearch(GrepSearchRequest) returns (GrepSearchResponse);

  // GlobSearch finds files matching glob pattern
  rpc GlobSearch(GlobSearchRequest) returns (GlobSearchResponse);

  // SymbolSearch searches for code symbols by name
  rpc SymbolSearch(SymbolSearchRequest) returns (SymbolSearchResponse);
}

// ReadFileRequest requests file content from client
message ReadFileRequest {
  string session_id = 1;
  string file_path = 2;
  int32 start_line = 3;
  int32 end_line = 4;
}

// ReadFileResponse returns file content
message ReadFileResponse {
  string content = 1;
  string language = 2;
  int32 total_lines = 3;
  Error error = 4;
}

// SearchCodeRequest requests vector search from client
message SearchCodeRequest {
  string session_id = 1;
  string query = 2;
  string project_key = 3;
  int32 limit = 4;
  float min_score = 5;
}

// SearchCodeResponse returns search results
message SearchCodeResponse {
  repeated CodeChunk chunks = 1;
  Error error = 2;
}

// GetProjectTreeRequest requests project tree from client
message GetProjectTreeRequest {
  string session_id = 1;
  string project_key = 2;
  bool include_descriptions = 3;
}

// GetProjectTreeResponse returns project tree
message GetProjectTreeResponse {
  ProjectMetadata metadata = 1;
  repeated TreeNode nodes = 2;
  Error error = 3;
}

// TreeNode represents a node in the project tree
message TreeNode {
  string path = 1;
  string name = 2;
  bool is_directory = 3;
  string description = 4;
  repeated TreeNode children = 5;
}

// GrepSearchRequest requests pattern-based search
message GrepSearchRequest {
  string session_id = 1;
  string pattern = 2;
  int32 limit = 3;
  repeated string file_types = 4;
  bool ignore_case = 5;
}

// GrepSearchResponse returns grep search results
message GrepSearchResponse {
  repeated GrepMatch matches = 1;
  Error error = 2;
}

// GrepMatch represents a single grep match
message GrepMatch {
  string file_path = 1;
  int32 line = 2;
  string content = 3;
  string context = 4;
}

// GlobSearchRequest requests glob pattern search
message GlobSearchRequest {
  string session_id = 1;
  string pattern = 2;
  int32 limit = 3;
}

// GlobSearchResponse returns glob search results
message GlobSearchResponse {
  repeated GlobMatch matches = 1;
  Error error = 2;
}

// GlobMatch represents a matched file path
message GlobMatch {
  string file_path = 1;
}

// SymbolSearchRequest requests symbol search
message SymbolSearchRequest {
  string session_id = 1;
  string symbol_name = 2;
  int32 limit = 3;
  repeated string symbol_types = 4;
}

// SymbolSearchResponse returns symbol search results
message SymbolSearchResponse {
  repeated SymbolMatch matches = 1;
  Error error = 2;
}

// SymbolMatch represents a matched code symbol
message SymbolMatch {
  string file_path = 1;
  int32 start_line = 2;
  int32 end_line = 3;
  string symbol_name = 4;
  string symbol_type = 5;
  string signature = 6;
  string content = 7;
}
