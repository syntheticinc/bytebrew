syntax = "proto3";

package bytebrew.v1;

option go_package = "github.com/syntheticinc/bytebrew/bytebrew-srv/api/proto/gen;bytebrewv1";

// MobileService provides gRPC API for mobile app to interact with bytebrew-srv.
// Mobile connects directly via LAN (or later through bridge for remote access).
service MobileService {
  // GeneratePairingToken creates a temporary pairing token for mobile device pairing.
  // Called by CLI to initiate pairing flow (no device-token auth required).
  rpc GeneratePairingToken(GeneratePairingTokenRequest) returns (GeneratePairingTokenResponse);

  // Pair authenticates a mobile device using a pairing token from QR/code.
  rpc Pair(PairRequest) returns (PairResponse);

  // ListSessions returns all active CLI sessions on this server.
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);

  // SubscribeSession subscribes to real-time events from a specific session.
  rpc SubscribeSession(SubscribeSessionRequest) returns (stream SessionEvent);

  // SendCommand sends a command (new task, ask_user reply, cancel) to a session.
  rpc SendCommand(SendCommandRequest) returns (SendCommandResponse);

  // ListDevices returns all paired mobile devices.
  rpc ListDevices(ListDevicesRequest) returns (ListDevicesResponse);

  // RevokeDevice revokes a paired device's access.
  rpc RevokeDevice(RevokeDeviceRequest) returns (RevokeDeviceResponse);

  // Ping checks connectivity.
  rpc Ping(MobilePingRequest) returns (MobilePongResponse);

  // WaitForPairing blocks until the given pairing token is consumed by a mobile
  // device, then sends a single event with paired device info and closes.
  // Called by CLI after displaying the QR code.
  rpc WaitForPairing(WaitForPairingRequest) returns (stream WaitForPairingEvent);
}

// --- Pairing ---

message GeneratePairingTokenRequest {}

message GeneratePairingTokenResponse {
  string short_code = 1;   // 6-digit code for manual entry
  string token = 2;        // Full token (hex encoded, for QR)
  int64 expires_at = 3;    // Unix timestamp when the token expires
  string server_name = 4;  // Human-readable server/machine name
  string server_id = 5;    // Unique server identifier
  int32 server_port = 6;   // gRPC port the server is listening on
  bytes server_public_key = 7;  // X25519 public key for ECDH key exchange
}

message PairRequest {
  string pairing_token = 1;  // 6-digit code or full token from QR
  string device_name = 2;    // Human-readable device name (e.g. "iPhone 15")
  bytes mobile_public_key = 3;  // X25519 public key from mobile device for ECDH
}

message PairResponse {
  string device_id = 1;      // Unique ID for this paired device
  string device_token = 2;   // Long-lived auth token for subsequent requests
  string server_name = 3;    // Human-readable server/machine name
  string server_id = 4;      // Unique server identifier
  bytes server_public_key = 5;  // X25519 public key for ECDH key exchange
}

// --- Sessions ---

message ListSessionsRequest {}

message ListSessionsResponse {
  repeated MobileSession sessions = 1;
  string server_name = 2;
  string server_id = 3;
}

message MobileSession {
  string session_id = 1;
  string project_key = 2;
  string project_root = 3;
  SessionState status = 4;
  string current_task = 5;
  int64 started_at = 6;       // Unix timestamp
  int64 last_activity_at = 7; // Unix timestamp
  bool has_ask_user = 8;      // Whether agent is waiting for user input
  string platform = 9;        // "windows", "linux", "darwin"
}

enum SessionState {
  SESSION_STATE_UNSPECIFIED = 0;
  SESSION_STATE_ACTIVE = 1;
  SESSION_STATE_IDLE = 2;
  SESSION_STATE_NEEDS_ATTENTION = 3;
  SESSION_STATE_COMPLETED = 4;
  SESSION_STATE_FAILED = 5;
}

// --- Subscribe ---

message SubscribeSessionRequest {
  string session_id = 1;
  string last_event_id = 2;  // For reconnect: get missed events after this ID
}

message SessionEvent {
  string event_id = 1;
  string session_id = 2;
  SessionEventType type = 3;
  int64 timestamp = 4;
  string agent_id = 5;
  int32 step = 6;

  oneof payload {
    AgentMessageEvent agent_message = 10;
    ToolCallStartEvent tool_call_start = 11;
    ToolCallEndEvent tool_call_end = 12;
    ReasoningEvent reasoning = 13;
    AskUserEvent ask_user = 14;
    PlanEvent plan = 15;
    SessionStatusEvent session_status = 16;
    ErrorEvent error_event = 17;
  }
}

enum SessionEventType {
  SESSION_EVENT_TYPE_UNSPECIFIED = 0;
  SESSION_EVENT_TYPE_AGENT_MESSAGE = 1;
  SESSION_EVENT_TYPE_TOOL_CALL_START = 2;
  SESSION_EVENT_TYPE_TOOL_CALL_END = 3;
  SESSION_EVENT_TYPE_REASONING = 4;
  SESSION_EVENT_TYPE_ASK_USER = 5;
  SESSION_EVENT_TYPE_PLAN_UPDATE = 6;
  SESSION_EVENT_TYPE_SESSION_STATUS = 7;
  SESSION_EVENT_TYPE_ERROR = 8;
  SESSION_EVENT_TYPE_ANSWER_CHUNK = 9;
}

message AgentMessageEvent {
  string content = 1;
  bool is_complete = 2;  // false for streaming chunks, true when done
}

message ToolCallStartEvent {
  string call_id = 1;
  string tool_name = 2;
  map<string, string> arguments = 3;
}

message ToolCallEndEvent {
  string call_id = 1;
  string tool_name = 2;
  string result_summary = 3;  // Short summary (e.g. "45 files", "128 lines")
  bool has_error = 4;
}

message ReasoningEvent {
  string content = 1;
  bool is_complete = 2;
}

message AskUserEvent {
  string question = 1;
  repeated string options = 2;  // Predefined options (can be empty for free-text)
  bool is_answered = 3;
}

message PlanEvent {
  string plan_name = 1;
  repeated PlanStepEvent steps = 2;
}

message PlanStepEvent {
  string title = 1;
  PlanStepStatus status = 2;
}

enum PlanStepStatus {
  PLAN_STEP_STATUS_UNSPECIFIED = 0;
  PLAN_STEP_STATUS_PENDING = 1;
  PLAN_STEP_STATUS_IN_PROGRESS = 2;
  PLAN_STEP_STATUS_COMPLETED = 3;
  PLAN_STEP_STATUS_FAILED = 4;
}

message SessionStatusEvent {
  SessionState state = 1;
  string message = 2;
}

message ErrorEvent {
  string code = 1;
  string message = 2;
}

// --- Commands ---

message SendCommandRequest {
  string session_id = 1;

  oneof command {
    string new_task = 2;                // New task/question for the agent
    AskUserResponse ask_user_reply = 3; // Reply to agent's ask_user question
    bool cancel = 4;                    // Cancel current operation
  }
}

message AskUserResponse {
  string question = 1;  // Original question text (for matching)
  string answer = 2;    // User's answer
}

message SendCommandResponse {
  bool success = 1;
  string error_message = 2;
}

// --- Devices ---

message ListDevicesRequest {}

message ListDevicesResponse {
  repeated PairedDevice devices = 1;
}

message PairedDevice {
  string device_id = 1;
  string device_name = 2;
  int64 paired_at = 3;      // Unix timestamp
  int64 last_seen_at = 4;   // Unix timestamp
}

message RevokeDeviceRequest {
  string device_id = 1;
}

message RevokeDeviceResponse {
  bool success = 1;
}

// --- WaitForPairing ---

message WaitForPairingRequest {
  string token = 1;  // Full token from GeneratePairingToken
}

message WaitForPairingEvent {
  string device_name = 1;  // Name of the device that just paired
  string device_id = 2;    // ID of the paired device
}

// --- Ping ---

message MobilePingRequest {
  int64 timestamp = 1;
}

message MobilePongResponse {
  int64 timestamp = 1;
  string server_name = 2;
  string server_id = 3;
}
