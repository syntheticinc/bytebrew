# Docker Compose for ByteBrew Server dependencies
# PostgreSQL on non-standard port to avoid conflicts

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: bytebrew-srv-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bytebrew
    ports:
      - "5499:5432"
    volumes:
      - bytebrew_srv_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bytebrew"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  bytebrew_srv_pgdata:
