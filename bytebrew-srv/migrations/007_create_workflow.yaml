databaseChangeLog:
  - changeSet:
      id: 007-create-workflow-execution-table
      author: system
      changes:
        - createTable:
            tableName: workflow_execution
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: task_id
                  type: uuid
                  constraints:
                    nullable: false
                    unique: true
                    foreignKeyName: fk_workflow_execution_task
                    references: task(id)
              - column:
                  name: workflow_type
                  type: workflow_type
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: workflow_status
                  defaultValue: pending
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  defaultValueComputed: now()
                  constraints:
                    nullable: false

  - changeSet:
      id: 007-create-workflow-step-table
      author: system
      changes:
        - createTable:
            tableName: workflow_step
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: workflow_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_workflow_step_workflow
                    references: workflow_execution(id)
              - column:
                  name: step_number
                  type: integer
                  constraints:
                    nullable: false
              - column:
                  name: agent_type_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_workflow_step_agent_type
                    references: agent_type(id)
              - column:
                  name: status
                  type: workflow_status
                  defaultValue: pending
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: workflow_step
            columnNames: workflow_id, step_number
            constraintName: uq_workflow_step_number
